<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Практика по формам</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form class="form">
      <fieldset>
        <h2>Ваши личные данные</h2>

        <label for="name">Ваше имя</label>
        <input id="name" type="text" placeholder="Имя" required />

        <label for="age">Ваш возраст</label>
        <input id="age" type="number" placeholder="Возраст" />

        <label for="phone">Ваш номер телефона</label>
        <input id="phone" type="tel" placeholder="Номер телефона" required />

        <label for="email">Ваша почта</label>
        <input id="email" type="email" placeholder="Почта" required />

        <label for="message">Сообщение</label>
        <textarea id="message" placeholder="Ваше сообщение"></textarea>

        <label class="checkbox-label">
          <input type="checkbox" required />
          Я принимаю правила
        </label>

        <button type="submit">Отправить</button>
      </fieldset>
    </form>
  </body>
</html>
